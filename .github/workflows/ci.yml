# Full assurance suite on every push/PR — a publicly-verifiable green build (what adopters + auditors check, and an
# OpenSSF Scorecard "CI-Tests" signal). Runs the WHOLE suite (test-all.mjs: every module self-test + tamper-binding,
# fuzz, property-based, accuracy-benchmark, 42k-case differential), unlike the partial conformance.yml test.js.
name: ci
on:
  push:
    branches: [ main, 'sdk-*' ]
  pull_request:
permissions:
  contents: read
jobs:
  assurance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install (verify-pqc)
        run: npm ci || npm install
        working-directory: packages/verify-pqc
      - name: Full assurance suite (test-all.mjs)
        run: node test-all.mjs
        working-directory: packages/verify-pqc
      - name: KAT conformance (NIST-style deterministic vectors)
        run: node test-kat.mjs
        working-directory: packages/verify-pqc
      - name: End-to-end demo regression (CBOM -> Evidence Pack -> attestation, self-checking)
        run: node examples/demo/run-demo.mjs
        working-directory: packages/verify-pqc
      - name: Vendored action scanner is byte-identical to canonical (no drift)
        run: diff -q packages/verify-pqc/pqcbom.mjs packages/verify-pqc/pqcbom-action/pqcbom.mjs

  # Machine-checked FORMAL proofs (Z3 SMT) — the "prove it, don't claim it" differentiator, gated on
  # every push: each load-bearing property is proven (negation unsat) with a teeth control (broken
  # design -> sat). Runs the whole suite via formal/run_all.py; a regression here fails the build.
  formal-proofs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Z3
        run: pip install z3-solver
      - name: Machine-checked formal proof suite (Z3 SMT)
        run: python formal/run_all.py
        working-directory: packages/verify-pqc
