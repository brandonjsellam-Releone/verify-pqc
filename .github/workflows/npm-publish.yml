name: npm-publish
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance (Sigstore/SLSA attestation)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Full assurance suite (offline gate)
        run: PQC_SKIP_LIVE=1 node packages/verify-pqc/test-all.mjs

      - name: Publish @trelyan/verify-pqc (with provenance)
        run: npm publish --access public --provenance
        working-directory: packages/verify-pqc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
