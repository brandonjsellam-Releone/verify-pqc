name: 'TRELYAN Post-Quantum Readiness Scorecard'
description: 'Scan your repo for quantum-vulnerable crypto: A–F readiness grade + CycloneDX CBOM, and fail the build on broken crypto.'
author: 'TRELYAN'
branding:
  icon: 'shield'
  color: 'purple'
inputs:
  path:
    description: 'Directory to scan'
    required: false
    default: '.'
  fail-on:
    description: 'Comma-separated risk classes that fail the build (e.g. broken-classical,quantum-broken)'
    required: false
    default: 'broken-classical'
  min-grade:
    description: 'Minimum acceptable grade (A–F); build fails below it. Empty = no grade gate.'
    required: false
    default: ''
outputs:
  grade:
    description: 'Post-Quantum Readiness grade (A–F)'
  score:
    description: 'Post-Quantum Readiness score (0–100)'
  sarif-file:
    description: 'Path to the SARIF 2.1.0 report (upload via github/codeql-action/upload-sarif to populate the Security tab)'
  cbom-file:
    description: 'Path to the CycloneDX CBOM (cbom.cdx.json)'
runs:
  using: 'node20'
  main: 'run.mjs'
